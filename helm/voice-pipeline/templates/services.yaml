---
apiVersion: v1
kind: Service
metadata:
  name: voice-pipeline-llm
  labels:
    {{- include "voice-pipeline.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: llm
  ports:
    - port: {{ .Values.llm.port }}
      targetPort: {{ .Values.llm.port }}
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: voice-pipeline-speaches
  labels:
    {{- include "voice-pipeline.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: speaches
  ports:
    - port: {{ .Values.speaches.port }}
      targetPort: {{ .Values.speaches.port }}
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: voice-pipeline-orchestrator
  labels:
    {{- include "voice-pipeline.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: orchestrator
  ports:
    - port: {{ .Values.orchestrator.port }}
      targetPort: {{ .Values.orchestrator.port }}
      protocol: TCP
      name: http
